<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-group'></i> Comunidad IndieHub</h2>
      <p>Comparte tus experiencias, pide consejos y conecta con otros desarrolladores.</p>
    </div>
    <button class="btn-publish" (click)="nuevoTema()">+ Crear Publicación</button>
  </div>

  <div class="forum-grid">
    <div class="post-card" *ngFor="let post of posts">
      <div class="post-header">
        <div class="user-info">
          <div class="mini-avatar"><i class='bx bx-user'></i></div>
          <div class="meta">
            <span class="username">{{post.author}}</span>
            <span class="date">{{post.date | date}}</span>
          </div>
        </div>
        <span class="category-tag">{{post.tag}}</span>
      </div>

      <div class="post-body">
        <h3>{{post.title}}</h3>
        <p>{{post.content}}</p>
      </div>

      <div class="post-footer">
        <button class="action-btn"><i class='bx bx-comment'></i> {{post.comments}} Comentarios</button>
        <button class="action-btn"><i class='bx bx-upvote'></i> {{post.likes}}</button>
      </div>
    </div>
  </div>
</div>
