<div class="auth-page-wrapper">
  <div class="glass-card">
    <div class="brand-section">
      <span class="logo-icon-large">🎮</span>
      <h2>IndieHub</h2>
      <p>Bienvenido de vuelta a la mejor plataforma de juegos independientes.</p>
    </div>

    <div class="form-section">
      <h3>Iniciar Sesión</h3>

      @if (errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      <form (ngSubmit)="loginTradicional()">
        <div class="input-container">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="jugador@ejemplo.com" required autocomplete="off">
        </div>

        <div class="input-container">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-glow">Entrar al Nexo</button>
      </form>

      @if (isBiometricAvailable) {
        <div class="divider">
          <span>Acceso Rápido</span>
        </div>

        <button type="button" class="btn-biometric-modern" (click)="loginWithBiometrics()">
          <span class="icon"></span> Usar Huella o Rostro
        </button>
      }

      <div class="divider">
        <span>¿Nuevo por aquí?</span>
      </div>

      <a routerLink="/register" class="btn-outline-modern">Crear una cuenta</a>
    </div>
  </div>
</div>
