<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-library'></i> Mi Biblioteca</h2>
      <p>Juegos listos para descargar y jugar.</p>
    </div>
  </div>

  <div class="games-grid">
    @for (game of myGames; track game.id) {
      <div class="game-card">
        <div class="card-img-wrapper">
          <img [src]="game.imagen || game.image_url" [alt]="game.title" class="game-img">
        </div>
        <div class="game-info">
          <span class="category-tag">{{game.category}}</span>
          <h3>{{game.title}}</h3>

          <div class="card-actions">
            <a [href]="game.download_url" target="_blank" class="btn-primary" style="width: 100%; justify-content: center; text-decoration: none;">
              <i class='bx bx-download'></i> Descargar
            </a>
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <i class='bx bx-ghost'></i>
        <h3>Tu biblioteca está vacía</h3>
        <p>Parece que aún no tienes juegos.</p>
        <br>
        <a routerLink="/explorar" class="btn-primary"><i class='bx bx-compass'></i> Ir a la tienda</a>
      </div>
    }
  </div>
</div>
