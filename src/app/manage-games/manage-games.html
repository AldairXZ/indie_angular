<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-code-block'></i> Panel de Desarrollador</h2>
      <p>Publica y gestiona tus títulos en la tienda.</p>
    </div>
  </div>

  <div class="dev-card">
    <h3><i class='bx bx-cloud-upload'></i> Publicar Nuevo Juego</h3>

    <form>
      <div class="form-grid">
        <div class="form-group">
          <label>Título del Juego</label>
          <input type="text" class="input-modern" placeholder="Ej: Cyber Neon">
        </div>

        <div class="form-group">
          <label>Categoría</label>
          <select class="input-modern">
            <option value="" disabled selected>Selecciona una categoría...</option>
            <option value="Acción">Acción</option>
            <option value="Aventura">Aventura</option>
            <option value="RPG">RPG</option>
            <option value="Plataformas">Plataformas</option>
          </select>
        </div>

        <div class="form-group">
          <label>Precio (USD)</label>
          <input type="number" class="input-modern" placeholder="0.00">
        </div>

        <div class="form-group">
          <label>URL de la Imagen (Portada)</label>
          <input type="text" class="input-modern" placeholder="https://...">
        </div>

        <div class="form-group full-width">
          <label>Descripción del Juego</label>
          <textarea class="input-modern" rows="4" placeholder="De qué trata tu juego..."></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-cta-main" style="width: auto; padding: 12px 30px;">
          <i class='bx bx-check'></i> Guardar y Publicar
        </button>
      </div>
    </form>
  </div>
</div>
