<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-user-circle'></i> Mi Perfil</h2>
      <p>Gestiona tu información personal y configuración de cuenta.</p>
    </div>
  </div>

  <div class="profile-layout">
    <div class="profile-sidebar">
      <div class="avatar-container">
        <div class="avatar-circle">
          <i class='bx bx-user'></i>
        </div>
        <h3>{{ usuario?.username || 'Usuario' }}</h3>
        <span class="role-badge">{{ usuario?.role === 'developer' ? 'Desarrollador' : 'Jugador' }}</span>
      </div>
    </div>

    <div class="profile-content">
      <div class="profile-card">
        <h3><i class='bx bx-id-card'></i> Datos Personales</h3>
        <form>
          <div class="form-grid">
            <div class="form-group">
              <label>Nombre de Usuario</label>
              <input type="text" class="input-modern" [value]="usuario?.username" disabled>
            </div>
            <div class="form-group">
              <label>Correo Institucional</label>
              <input type="email" class="input-modern" [value]="usuario?.email" disabled>
            </div>
          </div>
        </form>
      </div>

      <div class="profile-card">
        <h3><i class='bx bx-fingerprint'></i> Seguridad</h3>
        <div class="security-options">
          <div class="security-item">
            <div class="sec-info">
              <strong>Autenticación Biométrica</strong>
              <p>Inicia sesión sin contraseñas usando huella dactilar o rostro.</p>
            </div>
            <button class="btn-secondary"><i class='bx bx-plus'></i> Configurar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
