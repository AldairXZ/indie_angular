<div class="app-wrapper">
  @if (!isAuthRoute) {
    <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
      <div class="sidebar-header">
        <span class="logo-icon">🎮</span>
        <h2 class="sidebar-title">IndieHub</h2>
      </div>
      <nav class="sidebar-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Catálogo</span>
        </a>
        <a routerLink="/explorar" routerLinkActive="active">
          <span class="nav-icon">🔍</span>
          <span class="nav-text">Explorar</span>
        </a>
        @if (hasPermission('publish_games')) {
          <a routerLink="/panel-desarrollador" routerLinkActive="active">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Panel Dev</span>
          </a>
        }
      </nav>
    </aside>
  }

  <div class="main-wrapper">
    @if (!isAuthRoute) {
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" (click)="toggleSidebar()">☰</button>
          <h1>Plataforma Indie</h1>
        </div>
        <nav class="topbar-right">
          @if (isAuthenticated) {
            <a routerLink="/perfil" class="profile-icon-link">
              <span class="profile-avatar">👤</span>
            </a>
            <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
          } @else {
            <a routerLink="/login" class="btn-login">Iniciar Sesión</a>
          }
        </nav>
      </header>
    }

    <main class="content-area" [class.full-screen]="isAuthRoute">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
