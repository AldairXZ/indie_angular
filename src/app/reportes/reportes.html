<div class="report-container">
  <div class="report-card">
    <h2><i class='bx bx-support'></i> Centro de Reportes</h2>
    <p class="subtitle">¿Encontraste un error o necesitas ayuda? Cuéntanos.</p>

    <form class="report-form">
      <div class="form-group">
        <label>Categoría del problema</label>
        <select class="input-modern">
          <option>Problema con mi cuenta/login</option>
          <option>Error al descargar un juego</option>
          <option>Reportar contenido inapropiado</option>
          <option>Sugerencia para la plataforma</option>
        </select>
      </div>

      <div class="form-group">
        <label>Título del reporte</label>
        <input type="text" class="input-modern" placeholder="Ej: No puedo iniciar sesión con mi huella">
      </div>

      <div class="form-group">
        <label>Descripción detallada</label>
        <textarea class="input-modern" rows="5" placeholder="Explica exactamente qué pasó..."></textarea>
      </div>

      <button type="button" class="btn-primary" style="width: 100%; justify-content: center;">
        <i class='bx bx-send'></i> Enviar Reporte
      </button>
    </form>
  </div>
</div>
