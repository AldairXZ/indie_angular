<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-compass'></i> Explorar Catálogo</h2>
      <p>Descubre y apoya el talento independiente.</p>
    </div>
    <div class="search-box">
      <i class='bx bx-search'></i>
      <input type="text" class="input-modern" placeholder="Buscar por título o género...">
    </div>
  </div>

  <div class="games-grid">
    @for (game of allGames; track game.id) {
      <div class="game-card">
        <div class="card-img-wrapper">
          <img [src]="game.imagen || game.image_url" [alt]="game.title" class="game-img">
          <div class="card-overlay">
            <button class="action-icon" (click)="addToWishlist(game.id)" title="Añadir a deseos">
              <i class='bx bx-heart'></i>
            </button>
            <button class="action-icon" title="Compartir">
              <i class='bx bx-share-alt'></i>
            </button>
          </div>
          <span class="price-badge">{{ game.price > 0 ? (game.price | currency) : 'GRATIS' }}</span>
        </div>
        <div class="game-info">
          <div class="info-top">
            <span class="category-tag">{{game.category}}</span>
            <div class="rating">
              <i class='bx bxs-star'></i>
              <span>4.8</span>
            </div>
          </div>
          <h3>{{game.title}}</h3>
          <p class="developer"><i class='bx bx-code-block'></i> {{game.developer}}</p>

          <div class="card-actions-row">
            <button class="btn-cta-main" (click)="addToLibrary(game.id)">
              <i class='bx bx-cart-add'></i> Adquirir ahora
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
