<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h2><i class='bx bx-compass'></i> Explorar Catálogo</h2>
      <p>Descubre los mejores títulos independientes.</p>
    </div>
    <div class="search-box">
      <i class='bx bx-search'></i>
      <input type="text" class="input-modern" placeholder="Buscar juegos...">
    </div>
  </div>

  <div class="games-grid">
    @for (game of allGames; track game.id) {
      <div class="game-card">
        <div class="card-img-wrapper">
          <img [src]="game.imagen || game.image_url" [alt]="game.title" class="game-img">
          <span class="price-badge">{{ game.price > 0 ? '$' + game.price : 'GRATIS' }}</span>
        </div>
        <div class="game-info">
          <span class="category-tag">{{game.category}}</span>
          <h3>{{game.title}}</h3>
          <p class="developer"><i class='bx bx-code-block'></i> {{game.developer}}</p>

          <div class="card-actions">
            <button class="btn-primary" (click)="addToLibrary(game.id)">
              <i class='bx bx-plus'></i> Obtener
            </button>
            <button class="btn-secondary" (click)="addToWishlist(game.id)">
              <i class='bx bx-heart'></i>
            </button>
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <i class='bx bx-loader-alt bx-spin'></i>
        <p>Cargando catálogo...</p>
      </div>
    }
  </div>
</div>
